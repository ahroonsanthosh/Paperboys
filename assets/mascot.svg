<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" width="240" height="300" role="img" aria-label="Paperboys mascot — a cheerful paperboy holding a rolled newspaper">
  <defs>
    <style>
      .ink{fill:#16335f}
      .skin{fill:#e8b98f}
      .skinD{fill:#cf9c72}
      .cream{fill:#f4ecd8}
      .terra{fill:#c45a3b}
      .mustard{fill:#d99a2b}
    </style>
  </defs>
  <!-- back leg/body shadow -->
  <ellipse cx="120" cy="288" rx="70" ry="9" fill="#16335f" opacity="0.12"/>
  <!-- legs -->
  <rect class="ink" x="96" y="208" width="20" height="68" rx="9"/>
  <rect class="ink" x="124" y="208" width="20" height="68" rx="9"/>
  <!-- shoes -->
  <path class="terra" d="M90 272h34a8 8 0 0 1 8 8v4H90z"/>
  <path class="terra" d="M118 272h34a8 8 0 0 1 8 8v4h-42z"/>
  <!-- torso / sweater -->
  <path class="mustard" d="M82 150c0-14 16-24 38-24s38 10 38 24v52c0 12-10 16-38 16s-38-4-38-16z"/>
  <!-- sweater stripes -->
  <rect class="ink" x="82" y="168" width="76" height="7" opacity=".85"/>
  <rect class="ink" x="82" y="186" width="76" height="7" opacity=".85"/>
  <!-- satchel strap -->
  <path d="M150 132l-78 56" stroke="#8a4a2c" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- satchel bag -->
  <rect class="terra" x="52" y="180" width="46" height="40" rx="7"/>
  <rect class="cream" x="64" y="188" width="22" height="16" rx="2"/>
  <rect class="ink" x="66" y="192" width="18" height="2.5"/>
  <rect class="ink" x="66" y="197" width="13" height="2.5"/>
  <!-- arms -->
  <path class="mustard" d="M150 156c18 2 34 12 40 26 3 7-7 12-11 5-8-12-20-18-33-19z"/>
  <path class="mustard" d="M88 156c-14 4-24 14-28 26-2 7 8 11 11 4 5-11 14-17 23-19z"/>
  <!-- hand holding paper -->
  <circle class="skin" cx="186" cy="190" r="11"/>
  <!-- rolled newspaper -->
  <g transform="rotate(-28 196 184)">
    <rect class="cream" x="176" y="172" width="58" height="22" rx="11"/>
    <rect class="ink" x="186" y="178" width="38" height="2.6"/>
    <rect class="ink" x="186" y="183" width="30" height="2.6"/>
    <rect class="terra" x="178" y="172" width="6" height="22"/>
  </g>
  <!-- head -->
  <circle class="skin" cx="120" cy="104" r="40"/>
  <path class="skinD" d="M120 144a40 40 0 0 0 28-12c-6 9-16 14-28 14z" opacity=".5"/>
  <!-- ears -->
  <circle class="skin" cx="82" cy="106" r="7"/>
  <circle class="skin" cx="158" cy="106" r="7"/>
  <!-- smile -->
  <path d="M104 116q16 16 32 0" stroke="#9c5a37" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- cheeks -->
  <circle class="terra" cx="98" cy="112" r="6" opacity=".35"/>
  <circle class="terra" cx="142" cy="112" r="6" opacity=".35"/>
  <!-- eyes -->
  <circle class="ink" cx="106" cy="98" r="5"/>
  <circle class="ink" cx="134" cy="98" r="5"/>
  <circle fill="#fff" cx="108" cy="96" r="1.6"/>
  <circle fill="#fff" cx="136" cy="96" r="1.6"/>
  <!-- flat cap -->
  <path class="ink" d="M78 84c0-26 20-44 42-44s42 18 42 44c0 6-4 8-10 6-20-7-44-7-64 0-6 2-10 0-10-6z"/>
  <path class="ink" d="M150 86c18 0 30 6 30 13 0 5-8 7-18 5-8-2-16-3-24-3z"/>
  <circle class="terra" cx="120" cy="48" r="6"/>
</svg>
