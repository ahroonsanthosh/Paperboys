<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" width="420" height="280" role="img" aria-label="The Paperboys mascot — two cheerful newsboy faces in flat caps, grinning side by side">
  <defs>
    <style>
      .ink{fill:none;stroke:#16335f;stroke-width:7;stroke-linejoin:round;stroke-linecap:round}
      .skin{fill:#f0c79b}
      .mouth{fill:#16335f}
      .eye{fill:none;stroke:#16335f;stroke-width:7;stroke-linecap:round}
    </style>
  </defs>

  <!-- ===== BACK (left) FACE ===== -->
  <g transform="rotate(-6 150 150)">
    <!-- head -->
    <circle class="skin" cx="150" cy="150" r="72"/>
    <circle class="ink" cx="150" cy="150" r="72"/>
    <!-- flat cap -->
    <path class="skin" d="M84 110c0-33 30-56 66-56s66 23 66 56c0 9-8 12-16 9-6-3-12 2-18-1-32-12-58-12-80 0-6 3-12-2-18 1-8 3-16 0-16-9z"/>
    <path class="ink" d="M84 110c0-33 30-56 66-56s66 23 66 56c0 9-8 12-16 9-6-3-12 2-18-1-32-12-58-12-80 0-6 3-12-2-18 1-8 3-16 0-16-9z"/>
    <!-- cap brim -->
    <path class="skin" d="M198 114c20-2 35 3 35 12 0 6-10 8-21 6-9-2-17-3-25-3z"/>
    <path class="ink" d="M198 114c20-2 35 3 35 12 0 6-10 8-21 6-9-2-17-3-25-3z"/>
    <!-- little flick on top -->
    <path class="ink" d="M150 54c4-9 12-12 20-9" />
    <!-- eyes (little c's facing in) -->
    <path class="eye" d="M134 152c-7-3-7-13 0-16"/>
    <path class="eye" d="M170 152c7-3 7-13 0-16"/>
    <!-- big open grin -->
    <path class="mouth" d="M114 172c0 28 72 28 72 0 0-7-8-8-14-5-14 7-30 7-44 0-6-3-14-2-14 5z"/>
    <path class="skin" d="M136 188c9 5 19 5 28 0-3 8-25 8-28 0z"/>
  </g>

  <!-- ===== FRONT (right) FACE ===== -->
  <g transform="rotate(7 272 138)">
    <!-- head -->
    <circle class="skin" cx="272" cy="138" r="74"/>
    <circle class="ink" cx="272" cy="138" r="74"/>
    <!-- flat cap -->
    <path class="skin" d="M204 96c0-34 31-58 68-58s68 24 68 58c0 9-8 13-17 9-6-3-12 2-19-1-33-12-60-12-83 0-6 3-12-2-18 1-8 4-16 0-16-9z"/>
    <path class="ink" d="M204 96c0-34 31-58 68-58s68 24 68 58c0 9-8 13-17 9-6-3-12 2-19-1-33-12-60-12-83 0-6 3-12-2-18 1-8 4-16 0-16-9z"/>
    <!-- cap brim -->
    <path class="skin" d="M322 99c21-2 36 3 36 13 0 6-10 8-22 6-9-2-17-3-25-3z"/>
    <path class="ink" d="M322 99c21-2 36 3 36 13 0 6-10 8-22 6-9-2-17-3-25-3z"/>
    <!-- little flick on top -->
    <path class="ink" d="M272 38c4-9 12-12 20-9" />
    <!-- eyes (little c's facing in) -->
    <path class="eye" d="M256 140c-7-3-7-13 0-16"/>
    <path class="eye" d="M292 140c7-3 7-13 0-16"/>
    <!-- big open grin -->
    <path class="mouth" d="M234 160c0 30 76 30 76 0 0-7-8-9-15-5-15 7-31 7-46 0-7-4-15-2-15 5z"/>
    <path class="skin" d="M257 177c10 5 20 5 30 0-3 8-27 8-30 0z"/>
  </g>
</svg>
